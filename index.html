  <body>
    <!-- Loader -->

    <div id="loader">

    <!-- Form -->

    <div class="container">
      <div class="left">

          ✔ Fan Repair <br />

          ✔ Wiring Work <br />

          ✔ Switch Board Repair <br />

          ✔ Home Electrical Problems
        </div>
      </div>

      <div class="right">
        <div class="badge">Electrical Booking Form</div>

        <h2>Hello 👋</h2>

        <p class="sub">Book your electrical service quickly</p>

        <form onsubmit="sendWhatsApp(event)">
          <div class="input-group">
            <label>Full Name</label>

            <input required id="name" placeholder="Enter full name" />
          </div>

          <div class="input-group">
            <label>Phone Number</label>

            <input required id="phone" placeholder="Phone Number" />
          </div>

          <div class="input-group">
            <label>Area / Address</label>

            <input id="area" placeholder="Address" />
          </div>

          <div class="input-group">
            <label>Problem Type</label>

            <select id="service">
              <option value="">Select Service</option>

              <option>Fan Repair</option>

              <option>Wiring Work</option>

              <option>Switch Board Repair</option>

              <option>AC Service / Repair</option>

              <option>AC Installation</option>

              <option>Washing Machine Repair</option>

              <option>Water Motor Repair</option>

              <option>Press / Iron Repair</option>

              <option>Light Installation</option>

              <option>MCB Repair</option>

              <option>Power Issue</option>

              <option>Short Circuit Problem</option>

              <option>Socket Repair</option>

              <option>Inverter Connection</option>

              <option>Geyser Repair</option>

              <option>Cooler Repair</option>

              <option>Door Bell Repair</option>

              <option>Home Electrical Problem</option>

              <option>Office Electrical Work</option>

              <option>Other</option>
            </select>
          </div>

          <div class="input-group">
            <label>Describe Problem</label>

            <textarea id="problem"></textarea>
          </div>

          <button id="submitBtn">Request Service</button>
        </form>

        <div class="footer">Available For Home Visits</div>
      </div>
    </div>

    <script>
      window.onload = function () {
        setTimeout(() => {
          document.getElementById("loader").style.display = "none";

          document.querySelector(".container").style.display = "grid";
        }, 2000);
      };

      function sendWhatsApp(e) {
        e.preventDefault();

        const btn = document.getElementById("submitBtn");

        btn.innerHTML = "Submitting...";

        const msg = `⚡ New Service Request

Name: ${name.value}

Phone: ${phone.value}

Area: ${area.value}

Service: ${service.value}

Problem: ${problem.value}`;

        setTimeout(() => {
          window.location.href = `https://wa.me/919056343091?text=${encodeURIComponent(msg)}`;

          btn.innerHTML = "Request Service";
        }, 800);
      }
    </script>
